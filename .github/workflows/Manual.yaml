on: 
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment for deployment'
        required: false
        type: choice
        options:
          - 'staging'
          - 'production'
        default: 'staging'
      run_ui_tests:
          description: 'Run UI testsing' # เพิ่ม parameter สำหรับการรัน UI Testing
          required: true
          type: boolean
          default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkosut Source Code
        uses: actions/checkout@v7.0.0 #ได้หจาก Marketplace ที่อยู่ขวามือ
        with:
          repository: ${{github.repository}}
          ref: ${{github.ref_name}}
      - name: list files in workspaces
        run: ls ${{github.workspace}}
  test:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_ui_tests == 'true' }}
    steps:
      - name: UI Testing
        run: echo "Run UI testsing tools in  ${github.event.inputs.environment} environment"      
