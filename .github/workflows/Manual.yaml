on: 
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkosut Source Code
        uses: actions/checkout@v7.0.0
        with:
          repository: ${{github.repository}}
          ref: ${{github.ref_name}}
      - name: list files in workspaces
        run: ls ${{github.workspace}}
